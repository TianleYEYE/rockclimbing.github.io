<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rock Climbing Scroll</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="climb-page" aria-label="攀岩滚动展示">
      <section class="climb-stage" aria-label="滚动攀岩场景">
        <div class="sky-haze" aria-hidden="true"></div>

        <div class="wall" aria-hidden="true">
          <div class="wall-face">
            <span class="crack crack-a"></span>
            <span class="crack crack-b"></span>
            <span class="crack crack-c"></span>
            <span class="crack crack-d"></span>
            <span class="hold hold-1"></span>
            <span class="hold hold-2"></span>
            <span class="hold hold-3"></span>
            <span class="hold hold-4"></span>
            <span class="hold hold-5"></span>
            <span class="hold hold-6"></span>
            <span class="hold hold-7"></span>
            <span class="hold hold-8"></span>
            <span class="ledge ledge-1"></span>
            <span class="ledge ledge-2"></span>
            <span class="ledge ledge-3"></span>
          </div>
        </div>

        <div class="climber" aria-hidden="true">
          <div class="rope"></div>
          <div class="head"></div>
          <div class="torso"></div>
          <div class="pack"></div>
          <div class="arm arm-left"></div>
          <div class="arm arm-right"></div>
          <div class="leg leg-left"></div>
          <div class="leg leg-right"></div>
          <div class="shoe shoe-left"></div>
          <div class="shoe shoe-right"></div>
          <div class="chalk-bag"></div>
        </div>

        <div class="scroll-cue" aria-hidden="true"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
